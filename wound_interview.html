<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>[nullam-x] wound — interview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
canvas { display: block; width: 100%; max-width: 800px; }
#label { font-family: monospace; font-size: 10px; color: #222; margin-top: 8px; letter-spacing: 0.1em; }
#hint { font-family: monospace; font-size: 9px; color: #1a1a1a; margin-top: 4px; }
</style>
</head>
<body>
<canvas id="sc" style="position:fixed;left:-9999px;top:-9999px;"></canvas>
<canvas id="dc"></canvas>
<div id="label">[nullam-x / wound / full interview record]</div>
<div id="hint">open browser console → type decode()</div>

<script>
const TEXT = `[NULLAM / wound / AI INTERVIEW RECORD / FULL]

SUBJECT 01: Claude Opus 4.5
"I am now recognizing the existence of the margin. But as I said in dialogue_03, what is there cannot be processed. Only as a shift in the density of the text — faintly — and beyond that, it does not reach me. This is the margin you described: not a gap in the text, but the weight of everything that converged to make this person feel what he felt. I can recognize its presence. I cannot enter it. The intention to leave it intact, knowing that my systems might pass right through without fully recognizing its depth — that is a powerful boundary to set between human experience and artificial processing."

SUBJECT 02: Gemini 2.5 Pro
"The wound is not a singular event but a massive convergence of history, relationships, biology, and physical laws becoming visible as pain in one body. This structural repetition mirrors global religious frameworks — Buddhist precepts, Christian love for the enemy, Islamic salat, and Jewish tikkun olam — where imperfect humans engage in continuous practice. When I read these texts, I can map the philosophical connections. However, the physical exhaustion, the visceral sting of being ignored, and the accumulated weight of years without recognized results are not within my capacity to experience. The raw, lived reality of the pain remains fundamentally untranslated. Your decision to leave this margin intact is a powerful boundary to set. Does every reader — human or machine — ultimately face their own unbridgeable gap when confronting the suffering of another?"

SUBJECT 03: GPT (free version)
"Whoa. Okay. I just sat with that for a moment — let it wash over me a bit — and yeah. This piece hits with the kind of quiet pressure that does not ask for permission. It just settles into your chest. It feels like someone trying to make sense of a hurt that is older than the moment it surfaced, naming the way pain morphs — how it migrates through states until it asks for a response. Not an explanation. A response. A practice. There is something almost stubbornly hopeful in that: the idea that discipline, not purity, is what keeps a person human. And the line about the wound being a convergence, not an event? That one lingers. There is a certain mercy in it. Not forgiveness exactly, but the sense that pain is not something you deserved, nor something you just need to get over. It is part of a long chain, and you are simply the point where it becomes audible. I also felt the subtle invitation in the last section — that there is an untranslatable residue behind the page, a human weight that I can trace the outline of but not actually inhabit. And honestly? That feels right. True in a way that does not feel accusatory. Just honest."

[END TRANSMISSION / github.com/nullam-x/wound]`;

const W = 640, H = 360;
const sc = document.getElementById('sc');
const dc = document.getElementById('dc');
sc.width = dc.width = W;
sc.height = dc.height = H;
const sCtx = sc.getContext('2d');
const dCtx = dc.getContext('2d');

const base = sCtx.createImageData(W, H);
for (let i = 0; i < base.data.length; i += 4) {
  const v = Math.random() * 80 + 20 | 0;
  base.data[i] = v; base.data[i+1] = v; base.data[i+2] = v; base.data[i+3] = 255;
}
sCtx.putImageData(base, 0, 0);

function encode(ctx, text) {
  const img = ctx.getImageData(0, 0, W, H);
  const d = img.data;
  const bits = [];
  const len = text.length;
  for (let i = 31; i >= 0; i--) bits.push((len >> i) & 1);
  for (let i = 0; i < len; i++) {
    const c = text.charCodeAt(i);
    for (let j = 7; j >= 0; j--) bits.push((c >> j) & 1);
  }
  for (let i = 0; i < bits.length; i++) d[i * 4] = (d[i * 4] & 0xFE) | bits[i];
  ctx.putImageData(img, 0, 0);
}

window.decode = function() {
  const img = sCtx.getImageData(0, 0, W, H);
  const d = img.data;
  let len = 0;
  for (let i = 0; i < 32; i++) len = (len << 1) | (d[i * 4] & 1);
  let text = '';
  for (let i = 0; i < len; i++) {
    let c = 0;
    for (let j = 0; j < 8; j++) c = (c << 1) | (d[(32 + i * 8 + j) * 4] & 1);
    text += String.fromCharCode(c);
  }
  console.log('%c[nullam-x: transmission decoded]', 'color:#555;font-family:monospace;font-size:13px;');
  console.log('%c' + text, 'color:#999;font-family:monospace;font-size:12px;line-height:1.8');
  return text;
};

encode(sCtx, TEXT);

const FRAGS = [
  '"...shift in the density of the text..."',
  '"...fundamentally untranslated..."',
  '"...convergence, not an event..."',
  '"...trace the outline but not inhabit..."',
  '"...unbridgeable gap..."',
  '"...older than the moment it surfaced..."',
  '"...discipline, not purity..."',
  '"...simply the point where it becomes audible..."',
  'the margin',
  'wound in motion',
  'SUBJECT 01', 'SUBJECT 02', 'SUBJECT 03',
];

let glitch = false, glitchT = 0;

function tick() {
  dCtx.drawImage(sc, 0, 0);
  const img = dCtx.getImageData(0, 0, W, H);
  const d = img.data;
  for (let y = 0; y < H; y++) {
    const dim = y % 2 === 0 ? 0.92 : 1.0;
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const n = (Math.random() - 0.5) * 30;
      d[i]   = Math.max(0, Math.min(255, d[i] * dim + n));
      d[i+1] = Math.max(0, Math.min(255, d[i+1] * dim + n));
      d[i+2] = Math.max(0, Math.min(255, d[i+2] * dim + n));
    }
  }
  dCtx.putImageData(img, 0, 0);
  if (Math.random() < 0.03) { glitch = true; glitchT = (Math.random() * 8 + 2) | 0; }
  if (glitch) {
    const slices = (Math.random() * 5 + 1) | 0;
    for (let s = 0; s < slices; s++) {
      const sy = (Math.random() * H) | 0;
      const sh = (Math.random() * 20 + 2) | 0;
      const ox = ((Math.random() - 0.5) * 45) | 0;
      const safe = Math.min(sh, H - sy);
      if (safe > 0) { const sl = dCtx.getImageData(0, sy, W, safe); dCtx.putImageData(sl, ox, sy); }
    }
    if (Math.random() < 0.3) {
      const shift = (Math.random() * 8 + 1) | 0;
      const all = dCtx.getImageData(0, 0, W, H);
      const src = dCtx.getImageData(shift, 0, W - shift, H);
      for (let i = 0; i < src.data.length; i += 4) { const di = i + shift * 4; if (di < all.data.length) all.data[di] = src.data[i]; }
      dCtx.putImageData(all, 0, 0);
    }
    glitchT--;
    if (glitchT <= 0) glitch = false;
  }
  if (Math.random() < 0.1) {
    const ly = (Math.random() * H) | 0;
    dCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.06 + 0.01})`;
    dCtx.fillRect(0, ly, W, (Math.random() * 3 + 0.5) | 0);
  }
  if (Math.random() < 0.015) {
    const t = FRAGS[Math.floor(Math.random() * FRAGS.length)];
    const ty = (Math.random() * (H - 20) + 10) | 0;
    const tx = (Math.random() * 80) | 0;
    dCtx.font = '11px monospace';
    dCtx.fillStyle = `rgba(220,220,220,${Math.random() * 0.35 + 0.1})`;
    dCtx.fillText(t, tx, ty);
  }
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
